<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Flora — Авторские открытки</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .catalog-page {
            background: linear-gradient(135deg, #d99bb4 0%, #ffffff 100%);
            min-height: 100vh;
        }

        .catalog-hero {
            text-align: center;
            padding: 60px 0 40px;
        }

        .catalog-hero h1 {
            font-size: 48px;
            font-weight: 800;
            color: #2c1a24;
            margin-bottom: 16px;
        }

        .catalog-hero p {
            font-size: 18px;
            color: #5e4a54;
            max-width: 600px;
            margin: 0 auto;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
            padding: 40px 0 80px;
        }

        .product-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px rgba(164, 76, 120, 0.2);
        }

        .product-img {
            width: 100%;
            height: 280px;
            overflow: hidden;
            background: linear-gradient(135deg, #f9eef3, #f3e0e8);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .product-card:hover .product-img img {
            transform: scale(1.05);
        }

        .img-placeholder {
            font-size: 80px;
            opacity: 0.5;
        }

        .product-info {
            padding: 20px;
        }

        .product-title {
            font-size: 20px;
            font-weight: 700;
            color: #2c1a24;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 24px;
            font-weight: 800;
            color: #a44c78;
            margin: 12px 0;
        }

        .product-desc {
            font-size: 14px;
            color: #7a6672;
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .buy-btn {
            width: 100%;
            padding: 12px;
            background: #d99bb4;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .buy-btn:hover {
            background: #a44c78;
            transform: scale(1.02);
        }

        .wish-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            color: #a44c78;
            border: 1px solid #d99bb4;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .wish-btn:hover {
            background: #f9eef3;
            transform: scale(1.02);
        }

        .back-link {
            color: #2c1a24;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            color: #a44c78;
        }

        /* Стили для модального окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 32px;
            padding: 32px;
            position: relative;
            animation: fadeInUp 0.3s ease;
        }

        .close-modal {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-modal:hover {
            color: #a44c78;
        }

        .modal h2 {
            color: #2c1a24;
            margin-bottom: 8px;
        }

        .modal p {
            color: #7a6672;
            margin-bottom: 24px;
        }

        .modal label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #2c1a24;
        }

        .modal input, .modal textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0d0d8;
            border-radius: 16px;
            font-family: inherit;
            margin-bottom: 16px;
        }

        .modal textarea {
            resize: vertical;
        }

        .send-btn {
            width: 100%;
            padding: 14px;
            background: #a44c78;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover {
            background: #8b3d64;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            .catalog-hero h1 {
                font-size: 32px;
            }
            .product-img {
                height: 220px;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body class="catalog-page">

    <!-- Шапка каталога с корзиной -->
    <div class="header">
        <div class="container header-container">
            <a href="index.html" class="logo">Flora</a>
            <div class="header-actions">
                <a href="index.html" class="back-link">← На главную</a>
                <a href="cart.html" class="cart-btn">
                    🛒
                    <span id="cartCount" class="cart-count">0</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Основной контент -->
    <div class="container">
        <div class="catalog-hero">
            <h1>💌 Авторские открытки</h1>
            <p>Тёплые слова для ваших близких. Выберите открытку и добавьте своё пожелание!</p>
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Модальное окно для пожелания -->
    <div id="wishModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <h2>💝 Написать пожелание</h2>
            <p>К открытке <strong id="selectedCardName"></strong></p>
            
            <form id="wishForm">
                <label>Ваше имя</label>
                <input type="text" id="userName" required placeholder="Как к вам обращаться?">
                
                <label>Пожелание</label>
                <textarea id="userWish" rows="4" required placeholder="Напишите тёплые слова..."></textarea>
                
                <label>Email (для ответа)</label>
                <input type="email" id="userEmail" required placeholder="Ваш email">
                
                <button type="submit" class="send-btn">📨 Отправить пожелание</button>
            </form>
        </div>
    </div>

    <script>
        // ========== ТОВАРЫ (открытки — 9 штук) ==========
        const products = [
            { id: 401, name: "С днём рождения!", price: 150, desc: "Нежная открытка с цветами и поздравительным текстом", img: "card-1.jpg", emoji: "🎂" },
            { id: 402, name: "Любимой маме", price: 150, desc: "Тёплые слова благодарности в красивом оформлении", img: "card-2.jpg", emoji: "🌹" },
            { id: 403, name: "Любимому", price: 150, desc: "Романтичная открытка для самых искренних чувств", img: "card-3.jpg", emoji: "💖" },
            { id: 404, name: "Любимой", price: 150, desc: "Нежные стихи и изысканный дизайн", img: "card-4.jpg", emoji: "💕" },
            { id: 405, name: "С днём свадьбы!", price: 150, desc: "Поздравление молодожёнам с тёплыми пожеланиями", img: "card-5.jpg", emoji: "💍" },
            { id: 406, name: "С 8 Марта!", price: 150, desc: "Весенняя открытка с яркими цветами", img: "card-6.jpg", emoji: "🌷" },
            { id: 407, name: "Спасибо", price: 150, desc: "Открытка благодарности для особенных людей", img: "card-7.jpg", emoji: "🙏" },
            { id: 408, name: "Выздоравливай!", price: 150, desc: "Пожелание скорейшего выздоровления с заботой", img: "card-8.jpg", emoji: "🍀" },
            { id: 409, name: "Просто так", price: 150, desc: "Открытка без повода — просто чтобы порадовать", img: "card-9.jpg", emoji: "✨" }
        ];

        // Переменная для хранения выбранной открытки
        let selectedCard = null;

        // ========== ФУНКЦИЯ ОБНОВЛЕНИЯ СЧЁТЧИКА КОРЗИНЫ ==========
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            const countElem = document.getElementById('cartCount');
            if (countElem) countElem.textContent = totalCount;
        }

        // ========== ФУНКЦИЯ ДОБАВЛЕНИЯ В КОРЗИНУ ==========
        function addToCart(productId) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                const product = products.find(p => p.id === productId);
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    img: product.img,
                    emoji: product.emoji,
                    quantity: 1
                });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            alert('✅ Открытка добавлена в корзину!');
        }

        // ========== ОТКРЫТИЕ МОДАЛЬНОГО ОКНА ==========
        function openWishModal(cardId) {
            selectedCard = products.find(p => p.id === cardId);
            if (selectedCard) {
                document.getElementById('selectedCardName').textContent = selectedCard.name;
                document.getElementById('wishModal').style.display = 'flex';
            }
        }

        // ========== ЗАКРЫТИЕ МОДАЛЬНОГО ОКНА ==========
        function closeModal() {
            document.getElementById('wishModal').style.display = 'none';
            document.getElementById('wishForm').reset();
            selectedCard = null;
        }

        // ========== ОТПРАВКА ПОДАЖЕЛАНИЯ ==========
        function sendWish(event) {
            event.preventDefault();
            
            const userName = document.getElementById('userName').value;
            const userWish = document.getElementById('userWish').value;
            const userEmail = document.getElementById('userEmail').value;
            
            if (!userName || !userWish || !userEmail) {
                alert('Пожалуйста, заполните все поля!');
                return;
            }
            
            // Здесь можно отправить данные на сервер
            // Пока сделаем сохранение в localStorage и уведомление
            
            const wishes = JSON.parse(localStorage.getItem('clientWishes')) || [];
            wishes.push({
                cardName: selectedCard.name,
                cardId: selectedCard.id,
                userName: userName,
                userWish: userWish,
                userEmail: userEmail,
                date: new Date().toLocaleString()
            });
            localStorage.setItem('clientWishes', JSON.stringify(wishes));
            
            alert(`💝 Спасибо, ${userName}! Ваше пожелание к открытке "${selectedCard.name}" отправлено. Мы обязательно его учтём!`);
            
            closeModal();
        }

        // ========== ОТРИСОВКА ТОВАРОВ НА СТРАНИЦЕ ==========
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            if (!grid) return;
            
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-img">
                        <img src="images/${product.img}" alt="${product.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                        <div class="img-placeholder" style="display: none;">${product.emoji}</div>
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">${product.name}</h3>
                        <div class="product-price">${product.price.toLocaleString()} ₽</div>
                        <p class="product-desc">${product.desc}</p>
                        <button class="buy-btn" onclick="addToCart(${product.id})">В корзину</button>
                        <button class="wish-btn" onclick="openWishModal(${product.id})">💝 Написать пожелание</button>
                    </div>
                </div>
            `).join('');
            
            // Обработка плейсхолдеров
            document.querySelectorAll('.product-img').forEach(container => {
                const img = container.querySelector('img');
                const placeholder = container.querySelector('.img-placeholder');
                if (img && placeholder) {
                    img.onerror = function() {
                        img.style.display = 'none';
                        placeholder.style.display = 'flex';
                    };
                    img.onload = function() {
                        placeholder.style.display = 'none';
                    };
                }
            });
        }

        // ========== ЗАПУСК ==========
        renderProducts();
        updateCartCount();
        
        // Обработчик отправки формы
        document.getElementById('wishForm').addEventListener('submit', sendWish);
        
        // Закрытие по клику вне окна
        window.onclick = function(event) {
            const modal = document.getElementById('wishModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
</html>
