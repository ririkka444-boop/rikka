<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora — Корзина</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-page {
            background: linear-gradient(135deg, #d99bb4 0%, #ffffff 100%);
            min-height: 100vh;
        }

        .cart-hero {
            text-align: center;
            padding: 40px 0 30px;
        }

        .cart-hero h1 {
            font-size: 40px;
            font-weight: 800;
            color: #2c1a24;
        }

        .cart-items {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            border-bottom: 1px solid #f0e1e8;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-img {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #f9eef3, #f3e0e8);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            overflow: hidden;
        }

        .cart-item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-size: 18px;
            font-weight: 700;
            color: #2c1a24;
        }

        .cart-item-price {
            color: #a44c78;
            font-weight: 700;
            margin-top: 5px;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .quantity-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid #d99bb4;
            background: white;
            color: #a44c78;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quantity-btn:hover {
            background: #d99bb4;
            color: white;
        }

        .quantity-value {
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }

        .cart-item-total {
            font-weight: 800;
            font-size: 18px;
            color: #2c1a24;
            min-width: 100px;
            text-align: right;
        }

        .remove-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #debacc;
            transition: color 0.2s;
        }

        .remove-btn:hover {
            color: #a44c78;
        }

        .cart-summary {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 40px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            font-size: 18px;
        }

        .summary-row.total {
            font-size: 24px;
            font-weight: 800;
            color: #a44c78;
            border-top: 2px solid #f0e1e8;
            margin-top: 10px;
            padding-top: 20px;
        }

        .checkout-btn {
            width: 100%;
            padding: 16px;
            background: #a44c78;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .checkout-btn:hover {
            background: #8b3d64;
            transform: scale(1.02);
        }

        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 24px;
        }

        .empty-cart p {
            font-size: 20px;
            color: #7a6672;
            margin-bottom: 20px;
        }

        .empty-cart a {
            display: inline-block;
            padding: 12px 30px;
            background: #d99bb4;
            color: white;
            text-decoration: none;
            border-radius: 40px;
        }

        .empty-cart a:hover {
            background: #a44c78;
        }

        @media (max-width: 768px) {
            .cart-item {
                flex-wrap: wrap;
            }
            .cart-item-total {
                text-align: left;
                width: 100%;
                margin-left: 120px;
            }
        }
    </style>
</head>
<body class="cart-page">

    <!-- Шапка -->
    <div class="header">
        <div class="container header-container">
            <a href="index.html" class="logo">Flora</a>
            <a href="#" id="backLink" class="back-link">← Вернуться к покупкам</a>
        </div>
    </div>

    <!-- Основной контент -->
    <div class="container">
        <div class="cart-hero">
            <h1>🛒 Ваша корзина</h1>
        </div>

        <div id="cartContent"></div>
    </div>

    <script>
        // Установка правильной ссылки для возврата к каталогу
        document.addEventListener('DOMContentLoaded', function() {
            const backLink = document.getElementById('backLink');
            const lastCatalogPage = localStorage.getItem('lastCatalogPage') || 'catalog.html';
            backLink.href = lastCatalogPage;
            console.log('В корзине восстановлена ссылка:', lastCatalogPage);
        });

        // Данные корзины
        let cartData = [];

        // Загрузка корзины из localStorage
        function loadCart() {
            cartData = JSON.parse(localStorage.getItem('cart')) || [];
            renderCart();
        }

        // Сохранение корзины в localStorage
        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cartData));
            renderCart();
        }

        // Изменение количества товара
        function changeQuantity(id, delta) {
            const index = cartData.findIndex(item => item.id === id);
            if (index !== -1) {
                cartData[index].quantity += delta;
                if (cartData[index].quantity <= 0) {
                    cartData.splice(index, 1);
                }
                saveCart();
            }
        }

        // Удаление товара
        function removeItem(id) {
            cartData = cartData.filter(item => item.id !== id);
            saveCart();
        }

        // Очистка корзины (если понадобится)
        function clearCart() {
            cartData = [];
            saveCart();
        }

        // Отображение корзины
        function renderCart() {
            const container = document.getElementById('cartContent');
            const lastCatalogPage = localStorage.getItem('lastCatalogPage') || 'catalog.html';
            
            if (cartData.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <p>🌸 Ваша корзина пуста</p>
                        <a href="${lastCatalogPage}">Перейти в каталог</a>
                    </div>
                `;
                return;
            }

            let totalSum = 0;
            
            const itemsHtml = cartData.map(item => {
                const itemTotal = item.price * item.quantity;
                totalSum += itemTotal;
                return `
                    <div class="cart-item">
                        <div class="cart-item-img">
                            <img src="images/${item.img}" alt="${item.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='${item.emoji}'">
                        </div>
                        <div class="cart-item-info">
                            <div class="cart-item-title">${item.name}</div>
                            <div class="cart-item-price">${item.price.toLocaleString()} ₽</div>
                        </div>
                        <div class="cart-item-quantity">
                            <button class="quantity-btn" onclick="changeQuantity(${item.id}, -1)">−</button>
                            <span class="quantity-value">${item.quantity}</span>
                            <button class="quantity-btn" onclick="changeQuantity(${item.id}, 1)">+</button>
                        </div>
                        <div class="cart-item-total">${itemTotal.toLocaleString()} ₽</div>
                        <button class="remove-btn" onclick="removeItem(${item.id})">🗑️</button>
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="cart-items">
                    ${itemsHtml}
                </div>
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Товаров (${cartData.reduce((s, i) => s + i.quantity, 0)} шт.)</span>
                        <span>${totalSum.toLocaleString()} ₽</span>
                    </div>
                    <div class="summary-row total">
                        <span>Итого к оплате</span>
                        <span>${totalSum.toLocaleString()} ₽</span>
                    </div>
                    <button class="checkout-btn" onclick="alert('Спасибо за заказ! 🌸 Скоро с вами свяжется оператор.')">Оформить заказ</button>
                </div>
            `;
        }

        // Запуск при загрузке страницы
        loadCart();
    </script>
</body>
</html>
